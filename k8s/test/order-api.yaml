apiVersion: v1
kind: Namespace
metadata:
  name: test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: test
  labels:
    app: order-api
    env: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-api
      env: test
  template:
    metadata:
      labels:
        app: order-api
        env: test
    spec:
      containers:
        - name: order-api
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: order-api
  namespace: test
spec:
  selector:
    app: order-api
    env: test
  ports:
    - name: http
      port: 80
      targetPort: 8080
